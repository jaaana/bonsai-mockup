<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Spanish AI - Setup</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .sagrada-light-bg {
            background-color: #fffbf5;
            background-image: radial-gradient(at 20% 30%, hsla(45, 100%, 85%, 0.4) 0px, transparent 50%), radial-gradient(at 50% 80%, hsla(10, 100%, 90%, 0.4) 0px, transparent 50%);
            background-attachment: fixed;
        }
        .sagrada-header-texture {
            background-image: url("data:image/svg+xml,%3Csvg width='20' height='20' viewBox='0 0 20 20' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='%23ffffff' fill-opacity='0.07' fill-rule='evenodd'%3E%3Ccircle cx='3' cy='3' r='3'/%3E%3Ccircle cx='13' cy='13' r='3'/%3E%3C/g%3E%3C/svg%3E");
        }
        .organic-shape { border-radius: 45% 55% 70% 30% / 30% 60% 40% 70%; }
        .chip-selected { background-color: #fee2e2; border-color: #ef4444; color: #991b1b; transform: scale(1.05); }
    </style>
</head>
<body class="bg-orange-50 h-screen flex justify-center overflow-hidden font-sans">
    <div class="w-full max-w-md h-full bg-white flex flex-col shadow-xl relative">
        <header class="bg-red-800 sagrada-header-texture text-white p-4 flex items-center justify-between shadow-md z-10 relative">
            <div class="flex items-center gap-3 relative z-20">
                <a href="index.html" class="hover:bg-red-700 p-2 rounded-full transition"><i class="fa-solid fa-arrow-left"></i></a>
                <h1 class="font-bold text-lg">New Session</h1>
            </div>
        </header>

        <main class="flex-1 overflow-y-auto p-6 space-y-8 sagrada-light-bg no-scrollbar relative">
            <div class="text-center space-y-2 mt-4">
                <div class="w-16 h-16 organic-shape bg-red-100 mx-auto flex items-center justify-center border-2 border-red-200 mb-4 shadow-sm text-red-600">
                    <i class="fa-solid fa-comments text-3xl"></i>
                </div>
                <h2 class="text-2xl font-bold text-gray-800">What's the plan?</h2>
                <p class="text-gray-500 text-sm">Choose a theme or create your own.</p>
            </div>

            <div class="bg-white p-4 rounded-3xl shadow-md border border-red-50 relative group">
                <label class="block text-xs font-bold text-red-400 uppercase mb-2">Your Scenario</label>
                <textarea id="scenario-input" rows="3" class="w-full text-lg text-gray-800 placeholder-gray-300 outline-none resize-none font-medium" placeholder="Ex: I want to buy shoes in Madrid..."></textarea>
                <div class="absolute bottom-3 right-3 text-gray-300 group-focus-within:text-red-400 transition"><i class="fa-solid fa-pen"></i></div>
            </div>

            <div>
                <h3 class="text-sm font-bold text-gray-400 uppercase mb-3 ml-1">Popular Ideas</h3>
                <div class="flex flex-wrap gap-3">
                    <button onclick="selectTopic('Ordering at a restaurant')" class="chip px-4 py-2 rounded-xl bg-white border shadow-sm text-gray-600 font-medium hover:bg-red-50 transition">🍔 Restaurant</button>
                    <button onclick="selectTopic('Meeting a new friend')" class="chip px-4 py-2 rounded-xl bg-white border shadow-sm text-gray-600 font-medium hover:bg-red-50 transition">👋 Greetings</button>
                    <button onclick="selectTopic('Asking for directions')" class="chip px-4 py-2 rounded-xl bg-white border shadow-sm text-gray-600 font-medium hover:bg-red-50 transition">🗺️ Travel</button>
                </div>
            </div>
        </main>

        <footer class="p-4 bg-white border-t z-20">
            <button onclick="window.location.href='chat.html'" class="w-full bg-gradient-to-r from-red-600 to-red-500 text-white font-bold text-lg py-4 rounded-2xl shadow-lg active:scale-95 transition flex items-center justify-center gap-3">
                Start Session <i class="fa-solid fa-paper-plane"></i>
            </button>
        </footer>
    </div>
    <script>
        function selectTopic(text) { document.getElementById('scenario-input').value = text; document.getElementById('scenario-input').focus(); }
    </script>
</body>
</html>
